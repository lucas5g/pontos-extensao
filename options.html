<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Configurações - Folha de Ponto AZC</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

    body {
      background-color: #f1f5f9;
      margin: 0;
      padding: 40px 20px;
      font-family: 'Inter', sans-serif;
      color: #0f172a;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 480px;
    }

    .header {
      text-align: center;
      margin-bottom: 24px;
    }

    .header h2 {
      margin: 0 0 8px 0;
      font-size: 24px;
      font-weight: 600;
      color: #1e293b;
    }

    .header p {
      margin: 0;
      font-size: 14px;
      color: #64748b;
    }

    .card {
      background-color: #ffffff;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.025);
      border: 1px solid #e2e8f0;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #475569;
      margin-bottom: 8px;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: #0f172a;
      background-color: #f8fafc;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      box-sizing: border-box;
      transition: all 0.2s ease;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #3b82f6;
      background-color: #ffffff;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    input[type="text"]::placeholder {
      color: #94a3b8;
    }

    .file-input-wrapper {
      position: relative;
    }

    input[type="file"] {
      width: 100%;
      padding: 10px;
      font-size: 13px;
      color: #64748b;
      background-color: #f8fafc;
      border: 1px dashed #cbd5e1;
      border-radius: 8px;
      cursor: pointer;
      box-sizing: border-box;
      transition: all 0.2s ease;
    }

    input[type="file"]:hover {
      border-color: #94a3b8;
      background-color: #f1f5f9;
    }

    input[type="file"]::file-selector-button {
      padding: 8px 16px;
      margin-right: 12px;
      border: none;
      border-radius: 6px;
      background-color: #e2e8f0;
      color: #475569;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    input[type="file"]::file-selector-button:hover {
      background-color: #cbd5e1;
    }

    #preview {
      margin-top: 12px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #e2e8f0;
      display: none;
      background-color: #f8fafc;
      padding: 12px;
      text-align: center;
    }

    #preview img {
      max-width: 100%;
      max-height: 100px;
      object-fit: contain;
    }

    #preview p {
      margin: 0 0 8px 0;
      font-size: 12px;
      color: #64748b;
    }

    #status {
      min-height: 20px;
      font-size: 13px;
      font-weight: 500;
      text-align: center;
      margin-bottom: 20px;
      padding: 10px;
      border-radius: 6px;
      display: none;
    }

    #status.success {
      display: block;
      background-color: #dcfce7;
      color: #166534;
      border: 1px solid #bbf7d0;
    }

    #status.info {
      display: block;
      background-color: #fef3c7;
      color: #d97706;
      border: 1px solid #fde68a;
    }

    button#btnSave {
      width: 100%;
      padding: 14px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      background-color: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      transition: all 0.2s ease;
      box-shadow: 0 1px 2px rgba(37, 99, 235, 0.3);
      margin-top: 10px;
    }

    button#btnSave:hover {
      background-color: #1d4ed8;
      box-shadow: 0 4px 6px rgba(37, 99, 235, 0.2);
    }

    button#btnSave:active {
      transform: translateY(1px);
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h2>Configurações</h2>
      <p>Configure os dados para a sua Folha de Ponto AZC</p>
    </div>

    <div class="card">
      <div id="status"></div>

      <div class="form-group">
        <label for="name">Nome Completo</label>
        <input type="text" id="name" placeholder="Ex: LUCAS DE SOUSA ASSUNÇÃO">
      </div>

      <div class="form-group">
        <label for="masp">MASP</label>
        <input type="text" id="masp" placeholder="Ex: 7000.000-0">
      </div>

      <div class="form-group">
        <label for="signature">Assinatura (Imagem)</label>
        <div class="file-input-wrapper">
          <input type="file" id="signature" accept="image/*">
        </div>
        <div id="preview"></div>
      </div>

      <button id="btnSave">Salvar Configurações</button>
    </div>
  </div>
  <script src="options.js"></script>
</body>

</html>
