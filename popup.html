<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 250px;
      padding: 15px;
      font-family: sans-serif;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      cursor: pointer;
      background-color: #004a80;
      color: white;
      border: none;
      border-radius: 4px;
    }

    button:hover {
      background-color: #003359;
    }

    input {
      width: 100%;
      padding: 5px;
      margin-bottom: 10px;
      box-sizing: border-box;
    }

    label {
      font-size: 12px;
      margin-bottom: 5px;
      display: block;
    }
  </style>
</head>

<body>
  <h3>Folha de Ponto AZC</h3>

  <label for="name">Nome Completo:</label>
  <input type="text" id="name" placeholder="Ex: João da Silva">

  <label for="masp">MASP:</label>
  <input type="text" id="masp" placeholder="Ex: 123456-7">

  <label for="signature">Assinatura (Imagem):</label>
  <input type="file" id="signature" accept="image/*">
  <div id="status" style="font-size: 10px; color: green; margin-bottom: 10px;"></div>

  <button id="btnGenerate">Gerar PDF</button>

  <script src="popup.js"></script>
</body>

</html>
